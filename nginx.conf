server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 64M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript text/html
        application/json application/javascript application/xml+rss
        application/atom+xml application/xhtml+xml application/x-font-ttf
        application/x-font-opentype application/vnd.ms-fontobject
        image/svg+xml image/x-icon font/woff font/woff2;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;

    # Proxy API to backend (pakai internal Docker gateway, hindari hairpin NAT)
    location /api/ {
        proxy_pass http://172.21.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # robots.txt virtual — tidak perlu file fisik
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nDisallow: /wp-admin/\nDisallow: /wp-login.php\nDisallow: /wp-includes/\nDisallow: /wp-json/\n";
    }

    # llms.txt virtual — panduan konten untuk AI/LLM
    location = /llms.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        return 200 "# D Radius\n\n> Platform manajemen ISP modern untuk RT/RW Net dan Internet Provider di seluruh Indonesia.\n\nD Radius adalah layanan SaaS yang membantu operator ISP lokal mengelola pelanggan, billing, router MikroTik, dan WhatsApp gateway dalam satu platform terpadu. Layanan ini cocok untuk RT/RW Net, ISP lokal, dan Internet Provider skala kecil hingga menengah di Indonesia. Platform ini menyediakan RADIUS server berbasis standar RFC 2865, billing otomatis dengan integrasi Tripay, Midtrans, dan Xendit, serta WhatsApp gateway untuk notifikasi tagihan.\n\n## Halaman Utama\n\n- [Beranda](https://dradius.online/): Halaman utama platform manajemen ISP D Radius\n- [Fitur Platform](https://dradius.online/#features): Daftar lengkap fitur ISP management\n- [Harga & Paket](https://dradius.online/#harga): Paket berlangganan dari Gratis hingga Enterprise\n- [Cara Kerja](https://dradius.online/#cara-kerja): Panduan memulai dalam 4 langkah\n- [API & Integrasi](https://dradius.online/#api-langganan): Dokumentasi REST API untuk developer\n- [Testimoni](https://dradius.online/#testimonial): Ulasan dari 500+ operator ISP aktif\n- [FAQ](https://dradius.online/#faq): Pertanyaan yang sering ditanyakan\n\n## Informasi Perusahaan\n\n- [Tentang Kami](https://dradius.online/tentang-kami/): Profil dan nilai perusahaan D Radius\n- [Kontak & Support](https://dradius.online/kontak/): Hubungi tim via WhatsApp, email, atau tiket\n\n## Aplikasi\n\n- [Daftar Akun](https://app.dradius.online/register): Buat akun ISP baru secara gratis\n- [Login Dasbor](https://app.dradius.online/login): Masuk ke dasbor manajemen ISP\n";
    }

    # Cache HTML ringan — 5 menit, revalidasi di background
    location / {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass landing_wp:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        # Beri tahu PHP bahwa request aslinya adalah HTTPS (via Cloudflare)
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.ht {
        deny all;
    }
}
